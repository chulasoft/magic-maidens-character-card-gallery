<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Maidens — Archive</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { min-height: 100vh; }
    body { background: #E8DFD0; }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px) }
      to   { opacity:1; transform:translateY(0) }
    }
    @keyframes inkDrop {
      from { opacity:0; transform:scaleX(0) }
      to   { opacity:1; transform:scaleX(1) }
    }
    .site-enter { animation: fadeIn .8s cubic-bezier(.16,1,.3,1) both; }
    .ink-enter  { animation: inkDrop .5s cubic-bezier(.16,1,.3,1) both; }

    .mm-card { position:relative; overflow:hidden; border-radius:1px; cursor:pointer; }
    .mm-panel {
      position:absolute; bottom:0; left:0; right:0;
      transition: opacity .5s ease, transform .5s cubic-bezier(.16,1,.3,1);
    }
    .mm-card:hover .mm-panel { opacity:0; transform:translateY(10px); pointer-events:none; }
    .mm-card:hover { box-shadow: 0 22px 64px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.14) !important; }

    @keyframes cardDrop {
      0%   { opacity:0; transform:translateY(-100px) rotate(var(--r)) scale(0.86); }
      65%  { opacity:1; transform:translateY(6px) rotate(var(--r)) scale(1.02); }
      100% { opacity:1; transform:translateY(0) rotate(var(--r)) scale(1); }
    }
    @keyframes holoShift {
      0%   { background-position:0% 50%; }
      50%  { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }
    @keyframes softFadeIn {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes hintPulse {
      0%,100% { opacity:.45; }
      50%      { opacity:.75; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  /* ── DATA ────────────────────────────────────────────────── */
  const SERIES = {
    genesis: { label:"Arcane Genesis", roman:"I",  tagline:"The First Age of Awakening" },
    phantom: { label:"Arcane Phantom", roman:"II", tagline:"Echoes Beyond the Veil", max:130 },
  };

  const CHARACTERS = [
    {
      id:"026", series:"genesis", imgKey:"G026",
      name:["Cyrina","Elarion"], title:"Frostfang Warden",
      quote:"She carries the last blood of the old beasts.",
      faction:"Moonveil Covenant", element:"frost",
      inkColor:"#1A3A5C", stampColor:"#4A8AAA",
      gradTop:"#9CC5D8", gradMid:"#5A9AB8", gradBot:"#1E4A68", rune:"❄",
    },
    {
      id:"096", series:"genesis", imgKey:"G096",
      name:["Luneth","Aetheris"], title:"Chrono Sovereign",
      quote:"She exists between the final seconds.",
      faction:"Aetheris Chronicle Order", element:"chrono",
      inkColor:"#3A2A0E", stampColor:"#AA8830",
      gradTop:"#D4B870", gradMid:"#A88830", gradBot:"#3A2010", rune:"◈",
    },
    {
      id:"098", series:"genesis", imgKey:"G098",
      name:["Eirlys","Vantora"], title:"Tempest Knight",
      quote:"She speaks, and the heavens answer.",
      faction:"Aetheris Skyward Order", element:"storm",
      inkColor:"#1A2A3A", stampColor:"#708898",
      gradTop:"#B8CCE0", gradMid:"#7090B0", gradBot:"#1A3050", rune:"⚡",
    },
    {
      id:"096a", series:"phantom", imgKey:"P096",
      name:["Aurelia","Vermillion"], title:"Crimson Duchess",
      quote:"The throne bows before her smile.",
      faction:"House Vermillion", element:"blood",
      inkColor:"#3A0808", stampColor:"#AA1515",
      gradTop:"#C03030", gradMid:"#801010", gradBot:"#1A0000", rune:"♦",
    },
    {
      id:"029", series:"phantom", imgKey:"P029",
      name:["Velka","Noctyr"], title:"Fang Seer",
      quote:"She walks where the wild gods sleep.",
      faction:"Black Moon Communion", element:"beast",
      inkColor:"#1A0808", stampColor:"#8B1515",
      gradTop:"#A02020", gradMid:"#600808", gradBot:"#0A0000", rune:"🐺",
    },
    {
      id:"039", series:"phantom", imgKey:"P039",
      name:["Morvayne","Vespera"], title:"Wolfthrone Hexer",
      quote:"The wild obeys only one voice.",
      faction:"Bloodfang Dominion", element:"hex",
      inkColor:"#1A0808", stampColor:"#8B1010",
      gradTop:"#A01515", gradMid:"#580808", gradBot:"#0A0000", rune:"⚔",
    },
    {
      id:"059", series:"phantom", imgKey:"P059",
      name:["Ravessia","Vale"], title:"Scarlet Vesper",
      quote:"By the time you see the beautiful red, it is already over.",
      faction:"Ashen Veil Fixers", element:"scarlet",
      inkColor:"#2A0808", stampColor:"#A01818",
      gradTop:"#B02020", gradMid:"#700808", gradBot:"#150000", rune:"🌹",
    },
    {
      id:"070", series:"phantom", imgKey:"P070",
      name:["Vaelith","Nocturne"], title:"Ember Revenant",
      quote:"Only the dead ever learn her name.",
      faction:"Nightveil Fixers", element:"ember",
      inkColor:"#2A0808", stampColor:"#B83020",
      gradTop:"#C05030", gradMid:"#882010", gradBot:"#1A0808", rune:"🔥",
    },
    {
      id:"090", series:"phantom", imgKey:"P090",
      name:["Seraphine","Noctis"], title:"Second Eclipse",
      quote:"No prayer survives the crimson night.",
      faction:"Crimson Fixers", element:"eclipse",
      inkColor:"#3A0A0E", stampColor:"#8B1A1A",
      gradTop:"#C04040", gradMid:"#801010", gradBot:"#200008", rune:"🌑",
    },
  ];

  const SYMBOL = { frost:"❄", chrono:"◈", storm:"⚡", void:"✦", ember:"🔥", shadow:"◑", eclipse:"🌑", blood:"♦", beast:"🐺", hex:"⚔", scarlet:"🌹" };

  /* ── ORNAMENT DIVIDER ────────────────────────────────────── */
  // circle at cx=16 = exact center of viewBox 0-32
  // diamonds symmetric: left at x=10, right at x=22 → midpoint = 16 ✓
  function OrnamentDivider({ inkColor }) {
    return (
      <div style={{ display:"flex", alignItems:"center", margin:"8px 0" }}>
        <div style={{ flex:1, height:".5px", background:`linear-gradient(to right, transparent, ${inkColor}40)` }} />
        <svg width="32" height="10" viewBox="0 0 32 10" style={{ flexShrink:0 }}>
          <line x1="0" y1="5" x2="5"  y2="5" stroke={inkColor} strokeWidth=".6" opacity=".35"/>
          <polygon points="7,5 10,2.5 13,5 10,7.5" fill="none" stroke={inkColor} strokeWidth=".8" opacity=".5"/>
          <circle cx="16" cy="5" r="1.3" fill={inkColor} opacity=".55"/>
          <polygon points="19,5 22,2.5 25,5 22,7.5" fill="none" stroke={inkColor} strokeWidth=".8" opacity=".5"/>
          <line x1="27" y1="5" x2="32" y2="5" stroke={inkColor} strokeWidth=".6" opacity=".35"/>
        </svg>
        <div style={{ flex:1, height:".5px", background:`linear-gradient(to left, transparent, ${inkColor}40)` }} />
      </div>
    );
  }

  /* ── HEADER ORNAMENT ─────────────────────────────────────── */
  // center diamond at x=140 = exact half of viewBox 0-280 ✓
  function HeaderOrnament() {
    return (
      <svg width="280" height="20" viewBox="0 0 280 20"
        style={{ opacity:.3, display:"block", margin:"4px auto 0" }}>
        <line x1="0"   y1="10" x2="118" y2="10" stroke="#3A2A0E" strokeWidth=".6"/>
        <polygon points="120,10 126,6.5 130,10 126,13.5" fill="none" stroke="#3A2A0E" strokeWidth=".8"/>
        <polygon points="140,3 144,10 140,17 136,10"     fill="#3A2A0E" opacity=".65"/>
        <polygon points="150,10 154,6.5 158,10 154,13.5" fill="none" stroke="#3A2A0E" strokeWidth=".8"/>
        <line x1="160" y1="10" x2="280" y2="10" stroke="#3A2A0E" strokeWidth=".6"/>
      </svg>
    );
  }

  /* ── COMPASS ROSE ────────────────────────────────────────── */
  function CompassRose({ size=28, color="#6B5030", opacity=0.7 }) {
    return (
      <svg width={size} height={size} viewBox="0 0 40 40" style={{ opacity }}>
        {[0,45,90,135].map(r => (
          <g key={r} transform={`rotate(${r} 20 20)`}>
            <polygon points="20,3 22,18 20,17 18,18" fill={color} />
            <polygon points="20,37 22,22 20,23 18,22" fill={color} opacity={.5} />
          </g>
        ))}
        <circle cx="20" cy="20" r="3"  fill={color} />
        <circle cx="20" cy="20" r="6"  fill="none" stroke={color} strokeWidth=".5" />
        <circle cx="20" cy="20" r="10" fill="none" stroke={color} strokeWidth=".3" />
      </svg>
    );
  }

  /* ── CHARACTER CARD ──────────────────────────────────────── */
  function CharacterCard({ char, visible, onSelect }) {
    const [entered,   setEntered]   = useState(false);
    const [imgLoaded, setImgLoaded] = useState(false);
    const [imgError,  setImgError]  = useState(false);

    useEffect(() => {
      if (!visible) { setEntered(false); return; }
      const t = setTimeout(() => setEntered(true), 60);
      return () => clearTimeout(t);
    }, [visible]);

    return (
      <div
        className="mm-card"
        onClick={onSelect}
        style={{
          aspectRatio:"9/16",
          background:"#C8BCAA",
          border:`1px solid ${char.inkColor}18`,
          boxShadow:"0 4px 20px rgba(0,0,0,.12), 0 1px 4px rgba(0,0,0,.08)",
          transform: entered ? "translateY(0) scale(1)" : "translateY(18px)",
          opacity: entered ? 1 : 0,
          transition:"transform .5s cubic-bezier(.16,1,.3,1), opacity .5s, box-shadow .4s",
        }}
      >
        {/* Image — fills entire card */}
        <div style={{ position:"absolute", inset:0 }}>
          {!imgError && (
            <img
              src={`characters/${char.imgKey}.png`}
              alt={char.name.join(" ")}
              onLoad={() => setImgLoaded(true)}
              onError={() => setImgError(true)}
              style={{
                width:"100%", height:"100%",
                objectFit:"cover", objectPosition:"center top",
                display:"block",
                opacity: imgLoaded ? 1 : 0,
                transition:"opacity .4s",
              }}
            />
          )}
          {/* Fallback */}
          {(!imgLoaded || imgError) && (
            <div style={{
              position:"absolute", inset:0,
              background:`linear-gradient(170deg, ${char.gradTop}70 0%, ${char.gradMid}55 45%, ${char.gradBot}90 100%)`,
            }}>
              <div style={{
                position:"absolute", right:10, top:"18%",
                fontSize:110, lineHeight:1, color:char.stampColor,
                opacity:.07, userSelect:"none", fontFamily:"serif", filter:"blur(2px)",
              }}>
                {char.rune}
              </div>
            </div>
          )}
        </div>

        {/* Info panel — overlays bottom, fades on hover */}
        <div className="mm-panel" style={{
          background:`linear-gradient(to top, #D4C8B2FF 0%, #D4C8B2FF 80%, #D4C8B200 100%)`,
          padding:"32px 16px 16px",
        }}>
          {/* Series + number row */}
          <div style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:7, letterSpacing:".22em",
            color:`${char.inkColor}70`, textTransform:"uppercase", marginBottom:4,
          }}>
            {SERIES[char.series].label} &nbsp;·&nbsp; {char.id}
          </div>

          <OrnamentDivider inkColor={char.inkColor} />

          {/* Name */}
          <div style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:22, fontWeight:700, lineHeight:1.05,
            color:char.inkColor, letterSpacing:".02em",
            textShadow:"1px 1px 0 rgba(255,255,255,.3)",
            marginBottom:4,
          }}>
            {char.name[0]}<br/>{char.name[1]}
          </div>

          {/* Title */}
          <div style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:8, letterSpacing:".18em",
            color:char.stampColor, textTransform:"uppercase",
          }}>
            ♦ {char.title} ♦
          </div>

          <OrnamentDivider inkColor={char.inkColor} />

          {/* Quote */}
          <div style={{
            fontFamily:"'EB Garamond', Georgia, serif",
            fontStyle:"italic", fontSize:11.5,
            color:`${char.inkColor}B0`, lineHeight:1.55, marginBottom:10,
          }}>
            {char.quote}
          </div>

          {/* Faction */}
          <div style={{
            borderTop:`.5px solid ${char.inkColor}18`, paddingTop:8,
            display:"flex", alignItems:"center", gap:7,
          }}>
            <div style={{
              width:18, height:18, border:`1px solid ${char.inkColor}45`,
              borderRadius:2, display:"flex", alignItems:"center",
              justifyContent:"center", fontSize:9, color:char.inkColor, flexShrink:0,
            }}>
              {SYMBOL[char.element]}
            </div>
            <span style={{
              fontFamily:"'Cinzel', Georgia, serif",
              fontSize:8, letterSpacing:".12em",
              color:`${char.inkColor}A0`, textTransform:"uppercase", lineHeight:1.3,
            }}>
              {char.faction}
            </span>
          </div>
        </div>
      </div>
    );
  }

  /* ── SERIES TAB ───────────────────────────────────────────── */
  function SeriesTab({ series, active, onClick }) {
    return (
      <button onClick={onClick} style={{
        background: active ? "rgba(30,43,74,.08)" : "transparent",
        border: active ? "1px solid rgba(30,43,74,.35)" : "1px solid rgba(30,43,74,.12)",
        color: active ? "#1E2B4A" : "#8A7A60",
        fontFamily:"'Cinzel', Georgia, serif",
        fontSize:10, letterSpacing:".2em", textTransform:"uppercase",
        padding:"8px 24px", cursor:"pointer", borderRadius:1, transition:"all .25s",
        display:"flex", flexDirection:"column", alignItems:"center", gap:2,
      }}>
        <span style={{ fontSize:8, opacity:.6, letterSpacing:".3em" }}>Series {series.roman}</span>
        <span>{series.label}</span>
      </button>
    );
  }

  /* ── PAPER BG ─────────────────────────────────────────────── */
  function PaperBackground() {
    return (
      <div style={{
        position:"fixed", inset:0, zIndex:0, background:"#E8DFD0",
        backgroundImage:`
          radial-gradient(ellipse at 20% 15%, rgba(200,185,155,.6) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(185,170,140,.5) 0%, transparent 45%)
        `,
      }}>
        <div style={{
          position:"absolute", inset:0,
          backgroundImage:`repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(160,140,100,.018) 4px,rgba(160,140,100,.018) 5px)`,
        }}/>
        <div style={{
          position:"absolute", inset:0,
          background:"radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(130,110,80,.18) 100%)",
        }}/>
      </div>
    );
  }

  /* ── INTRO SCREEN ─────────────────────────────────────────── */
  function IntroScreen({ onDone }) {
    const [phase, setPhase] = useState("in");

    useEffect(() => {
      const t1 = setTimeout(() => setPhase("hold"), 700);
      const t2 = setTimeout(() => setPhase("out"),  2100);
      const t3 = setTimeout(() => onDone(),          2900);
      return () => [t1,t2,t3].forEach(clearTimeout);
    }, []);

    const shown = phase !== "in";
    return (
      <div style={{
        position:"fixed", inset:0, zIndex:100,
        background:"#E2D6C0",
        display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", gap:18,
        opacity: phase === "out" ? 0 : 1,
        transition: phase === "out" ? "opacity .8s ease-in" : "opacity .5s ease-out",
        pointerEvents: phase === "out" ? "none" : "all",
      }}>
        <div style={{
          position:"absolute", inset:0,
          background:"radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(120,100,70,.2) 100%)",
        }}/>
        <div style={{
          opacity: shown ? 1 : 0, transformOrigin:"center",
          transform: shown ? "scaleX(1)" : "scaleX(0)",
          transition:"all .7s cubic-bezier(.16,1,.3,1) .25s",
        }}>
          <HeaderOrnament />
        </div>
        <div style={{
          textAlign:"center",
          opacity: shown ? 1 : 0,
          transform: shown ? "translateY(0)" : "translateY(14px)",
          transition:"all .75s cubic-bezier(.16,1,.3,1) .1s",
        }}>
          <div style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:8, letterSpacing:".5em", color:"#8A7050",
            marginBottom:14, textTransform:"uppercase",
          }}>
            ♦ &nbsp; Official Collection Archive &nbsp; ♦
          </div>
          <h1 style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:"clamp(42px, 8vw, 86px)", fontWeight:700,
            lineHeight:1, color:"#1E1608", margin:0, letterSpacing:".06em",
            textShadow:"2px 3px 0 rgba(180,155,100,.2), 1px 1px 0 rgba(255,255,255,.5)",
          }}>
            Magic Maidens
          </h1>
          <div style={{
            fontFamily:"'EB Garamond', Georgia, serif",
            fontStyle:"italic", fontSize:14, color:"#6B5030",
            marginTop:10, letterSpacing:".06em",
          }}>
            Arcane Genesis &nbsp;·&nbsp; Arcane Phantom
          </div>
        </div>
        <div style={{
          opacity: shown ? 1 : 0, transformOrigin:"center",
          transform: shown ? "scaleX(1)" : "scaleX(0)",
          transition:"all .7s cubic-bezier(.16,1,.3,1) .4s",
        }}>
          <HeaderOrnament />
        </div>
        <div style={{
          position:"absolute", bottom:36,
          fontFamily:"'Cinzel', Georgia, serif",
          fontSize:8, letterSpacing:".3em", color:"#8A7050", textTransform:"uppercase",
          opacity: phase === "hold" ? 1 : 0, transition:"opacity .5s .15s",
        }}>
          Entering the Archive…
        </div>
      </div>
    );
  }

  /* ── CARD BACK ────────────────────────────────────────────── */
  function CardBack({ series }) {
    const isG = series === "genesis";
    /* Genesis: soft purple→blue  |  Phantom: deep black→red */
    const bg = isG
      ? "linear-gradient(145deg,#1E1260 0%,#3828A0 32%,#2252A8 65%,#142880 100%)"
      : "linear-gradient(145deg,#0E0008 0%,#200010 35%,#160008 65%,#0A0004 100%)";
    const lineColor  = isG ? "rgba(160,140,255,.28)" : "rgba(160,10,30,.38)";
    const accentRgba = isG ? "rgba(180,160,255," : "rgba(160,20,40,";
    const hatchColor = isG ? "#3020A0" : "#600010";
    return (
      <div style={{ position:"absolute", inset:0, borderRadius:12, overflow:"hidden", background:bg }}>
        <div style={{ position:"absolute", inset:10, borderRadius:8, border:`1px solid ${lineColor}` }}/>
        {/* Crosshatch */}
        <div style={{ position:"absolute", inset:0, opacity:.07,
          backgroundImage:`repeating-linear-gradient(45deg,${hatchColor} 0,${hatchColor} 1px,transparent 1px,transparent 12px),repeating-linear-gradient(-45deg,${hatchColor} 0,${hatchColor} 1px,transparent 1px,transparent 12px)` }}/>
        {/* MMG watermark */}
        <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center",
          fontFamily:"'Cinzel',Georgia,serif", fontWeight:900, fontSize:72,
          color:`${accentRgba}.14)`, userSelect:"none", pointerEvents:"none", letterSpacing:"-.02em" }}>MMG</div>
        {/* Compass rose */}
        <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <svg width="64" height="64" viewBox="0 0 40 40" style={{ opacity:.22 }}>
            {[0,45,90,135].map(r=>(
              <g key={r} transform={`rotate(${r} 20 20)`}>
                <polygon points="20,2 22,17 20,16 18,17" fill={isG?"#8878FF":"#901020"}/>
                <polygon points="20,38 22,23 20,24 18,23" fill={isG?"#8878FF":"#901020"} opacity={.5}/>
              </g>
            ))}
            <circle cx="20" cy="20" r="3"  fill={isG?"#8878FF":"#901020"}/>
            <circle cx="20" cy="20" r="7"  fill="none" stroke={isG?"#8878FF":"#901020"} strokeWidth=".6"/>
            <circle cx="20" cy="20" r="12" fill="none" stroke={isG?"#8878FF":"#901020"} strokeWidth=".3"/>
          </svg>
        </div>
        <div style={{ position:"absolute", top:16, left:0, right:0, textAlign:"center",
          fontFamily:"'Cinzel',Georgia,serif", fontSize:8, letterSpacing:".22em",
          color:`${accentRgba}.48)`, textTransform:"uppercase" }}>Magic Maidens</div>
        <div style={{ position:"absolute", bottom:18, left:0, right:0, textAlign:"center",
          fontFamily:"'Cinzel',Georgia,serif", fontSize:7.5, letterSpacing:".28em",
          color:`${accentRgba}.6)`, textTransform:"uppercase" }}>
          ♦ &nbsp;{isG ? "Arcane Genesis" : "Arcane Phantom"}&nbsp; ♦
        </div>
      </div>
    );
  }

  /* ── CARD REVEAL MODAL ─────────────────────────────────────── */
  function CardRevealModal({ char, onClose }) {
    /* heroPos: "stacked" | "lifted" | "down" | "back"
       flip:    false = face-down, true = face-up
       stackUp: false = visible, true = translated up + faded */
    const [heroPos,   setHeroPos]   = useState("stacked");
    const [flipped,   setFlipped]   = useState(false);
    const [stackUp,   setStackUp]   = useState(false);
    const [phase,     setPhase]     = useState("stacking");
    const [infoShow,  setInfoShow]  = useState(false);
    const [bgFading,  setBgFading]  = useState(false);
    const [imgLoaded, setImgLoaded] = useState(false);
    const [imgError,  setImgError]  = useState(false);
    const [holo,      setHolo]      = useState({ angle:135, px:50, py:50 });
    const heroRef = useRef(null);

    const stackCards = useMemo(() => Array.from({ length: 8 }, (_, i) => ({
      rot:   (Math.random() - 0.5) * 24,
      delay: i * 85,
    })), []);

    /* auto → waiting after all cards drop */
    useEffect(() => {
      const t = setTimeout(() => setPhase("waiting"), 8 * 85 + 480);
      return () => clearTimeout(t);
    }, []);

    /* Reveal: lift → slide+flip+stack-up → info */
    const handleReveal = () => {
      if (phase !== "waiting") return;
      setPhase("revealing");

      // 1) lift card off stack
      setHeroPos("lifted");

      // 2) slide card down + flip + stack moves up
      const t1 = setTimeout(() => {
        setHeroPos("down");
        setFlipped(true);
        setStackUp(true);
      }, 240);

      // 3) show info text
      const t2 = setTimeout(() => {
        setPhase("revealed");
        setInfoShow(true);
      }, 950);

      return () => { clearTimeout(t1); clearTimeout(t2); };
    };

    /* Collect: info out → card flips+rises → stack returns → bg fades last → close */
    const handleCollect = () => {
      setPhase("collecting");
      setInfoShow(false);

      // t=180ms: card flips back + slides up
      setTimeout(() => {
        setHeroPos("back");
        setFlipped(false);
      }, 180);

      // t=380ms: stack slides back down
      setTimeout(() => setStackUp(false), 380);

      // t=950ms: everything settled → NOW fade background
      setTimeout(() => setBgFading(true), 950);

      // t=1550ms: close (bg fade takes 600ms from 950ms)
      setTimeout(onClose, 1550);
    };

    /* Mouse holo tracking */
    const handleMouseMove = (e) => {
      if (phase !== "revealed" || !heroRef.current) return;
      const r  = heroRef.current.getBoundingClientRect();
      const px = ((e.clientX - r.left) / r.width)  * 100;
      const py = ((e.clientY - r.top)  / r.height) * 100;
      setHolo({ angle: 110 + (px - 50) * 1.4, px, py });
    };
    const handleMouseLeave = () => setHolo({ angle:135, px:50, py:50 });

    /* Hero transform map */
    const heroTransformMap = {
      stacked: "translateY(0px) scale(1)",
      lifted:  "translateY(-20px) scale(1.07)",
      down:    "translateY(120px) scale(1.04)",
      back:    "translateY(0px) scale(1)",
    };
    const heroTransitionMap = {
      stacked: "none",
      lifted:  "transform .22s cubic-bezier(.2,.8,.3,1)",
      down:    "transform .68s cubic-bezier(.2,.8,.3,1)",
      back:    "transform .65s cubic-bezier(.4,0,.2,1)",
    };

    const isRevealed = phase === "revealed";
    const cardW = "min(268px, 64vw)";

    return (
      <div
        onClick={e => { if (e.target === e.currentTarget) handleCollect(); }}
        style={{ position:"fixed", inset:0, zIndex:200,
          background: bgFading ? "rgba(6,4,2,0)" : "rgba(6,4,2,.91)",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          transition: bgFading ? "background .6s ease" : "background .5s ease", gap:0 }}>

        {/* ── STAGE: stack + hero ── */}
        <div style={{ position:"relative", width:cardW, aspectRatio:"9/16" }}>

          {/* Stack background cards — face down, drop in, move up when stackUp */}
          <div style={{
            position:"absolute", inset:0, zIndex:1,
            transform: stackUp ? "translateY(-230px)" : "translateY(0)",
            opacity:   stackUp ? 0 : 1,
            transition: stackUp
              ? "transform .62s cubic-bezier(.4,0,.2,1) .1s, opacity .5s ease .1s"
              : "transform .6s cubic-bezier(.2,.8,.3,1), opacity .5s ease",
          }}>
            {stackCards.map((sc, i) => (
              <div key={i} style={{
                position:"absolute", inset:0, borderRadius:12,
                '--r': `${sc.rot}deg`,
                animation:`cardDrop 0.48s cubic-bezier(.2,.8,.3,1) both`,
                animationDelay:`${sc.delay}ms`,
                boxShadow:"0 5px 18px rgba(0,0,0,.5)", zIndex: i,
              }}>
                <CardBack series={char.series}/>
              </div>
            ))}
          </div>

          {/* Hero card — lifts out, slides down, flips */}
          <div style={{
            position:"absolute", inset:0, zIndex:10,
            transform: heroTransformMap[heroPos],
            transition: heroTransitionMap[heroPos],
            cursor: phase === "waiting" ? "pointer" : "default",
            animation:`cardDrop 0.48s cubic-bezier(.2,.8,.3,1) both`,
            animationDelay:`${8 * 85}ms`,
          }}
            onClick={handleReveal}
            ref={heroRef}
            onMouseMove={handleMouseMove}
            onMouseLeave={handleMouseLeave}
          >
            {/* 3-D flip container */}
            <div style={{
              width:"100%", height:"100%", position:"relative",
              transformStyle:"preserve-3d",
              transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",
              transition:"transform .65s cubic-bezier(.4,0,.2,1)",
              perspective:"1100px",
            }}>
              {/* FACE DOWN — card back */}
              <div style={{ position:"absolute", inset:0, borderRadius:12, overflow:"hidden",
                backfaceVisibility:"hidden",
                boxShadow: phase === "waiting"
                  ? "0 0 0 1.5px rgba(200,180,255,.3), 0 18px 52px rgba(0,0,0,.65)"
                  : "0 10px 32px rgba(0,0,0,.5)" }}>
                <CardBack series={char.series}/>
                {/* shimmer hint when waiting */}
                {phase === "waiting" && (
                  <div style={{ position:"absolute", inset:0, borderRadius:12, pointerEvents:"none",
                    background:"linear-gradient(135deg,rgba(255,255,255,0) 30%,rgba(255,255,255,.07) 50%,rgba(255,255,255,0) 70%)",
                    backgroundSize:"200% 200%", animation:"holoShift 1.8s ease infinite" }}/>
                )}
              </div>

              {/* FACE UP — full image only, TCG border, holo */}
              <div style={{ position:"absolute", inset:0, borderRadius:12, overflow:"hidden",
                backfaceVisibility:"hidden", transform:"rotateY(180deg)",
                border: flipped ? "6px solid #F5F0EC" : "none",
                boxShadow: flipped
                  ? `0 0 0 1px ${char.stampColor}50, 0 30px 80px rgba(0,0,0,.75), 0 0 60px ${char.stampColor}25`
                  : "none",
                transition:"box-shadow .4s, border .35s" }}>
                {/* Image — full bleed, no text */}
                {!imgError && (
                  <img src={`characters/${char.imgKey}.png`} alt={char.name.join(" ")}
                    onLoad={() => setImgLoaded(true)} onError={() => setImgError(true)}
                    style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"center top",
                      display:"block", opacity:imgLoaded?1:0, transition:"opacity .4s" }}/>
                )}
                {(!imgLoaded||imgError) && (
                  <div style={{ position:"absolute", inset:0,
                    background:`linear-gradient(170deg,${char.gradTop}80,${char.gradMid}60,${char.gradBot})` }}>
                    <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center",
                      justifyContent:"center", fontSize:80, opacity:.1, fontFamily:"serif" }}>{char.rune}</div>
                  </div>
                )}
                {/* Holo layers */}
                {isRevealed && <>
                  <div style={{ position:"absolute", inset:0, pointerEvents:"none", mixBlendMode:"screen",
                    background:`linear-gradient(${holo.angle}deg,
                      hsla(${holo.angle},85%,62%,.13) 0%,
                      hsla(${holo.angle+55},85%,65%,.16) 20%,
                      hsla(${holo.angle+110},85%,62%,.13) 40%,
                      hsla(${holo.angle+175},85%,65%,.16) 60%,
                      hsla(${holo.angle+230},85%,62%,.13) 80%,
                      hsla(${holo.angle+285},85%,65%,.16) 100%)`,
                    transition:"background .12s ease" }}/>
                  <div style={{ position:"absolute", inset:0, pointerEvents:"none", mixBlendMode:"overlay",
                    background:"linear-gradient(135deg,rgba(255,255,255,0) 30%,rgba(255,255,255,.09) 50%,rgba(255,255,255,0) 70%)",
                    backgroundSize:"200% 200%", animation:"holoShift 2.6s ease infinite" }}/>
                  <div style={{ position:"absolute", inset:0, pointerEvents:"none", mixBlendMode:"screen",
                    background:`radial-gradient(ellipse at ${holo.px}% ${holo.py}%,rgba(255,255,255,.12) 0%,transparent 55%)`,
                    transition:"background .1s ease" }}/>
                </>}
              </div>
            </div>
          </div>

          {/* "Click to reveal" hint */}
          {phase === "waiting" && (
            <div style={{ position:"absolute", bottom:-36, left:0, right:0, textAlign:"center",
              fontFamily:"'Cinzel',Georgia,serif", fontSize:8.5, letterSpacing:".3em",
              color:"rgba(200,180,255,.5)", textTransform:"uppercase",
              animation:"hintPulse 2s ease infinite" }}>
              Click to reveal
            </div>
          )}
        </div>

        {/* ── INFO BELOW CARD ── */}
        <div style={{
          marginTop: 52, textAlign:"center",
          opacity: infoShow ? 1 : 0,
          transform: infoShow ? "translateY(0)" : "translateY(16px)",
          transition: infoShow
            ? "opacity .55s ease, transform .55s cubic-bezier(.16,1,.3,1)"
            : "opacity .25s ease, transform .25s ease",
          pointerEvents: infoShow ? "all" : "none",
        }}>
          <div style={{ fontFamily:"'Cinzel',Georgia,serif", fontWeight:700,
            fontSize:"clamp(20px,4vw,26px)", letterSpacing:".06em",
            color:"#F0E8D8", lineHeight:1.1, marginBottom:6,
            textShadow:"0 2px 14px rgba(0,0,0,.9)" }}>
            {char.name[0]} {char.name[1]}
          </div>
          <div style={{ fontFamily:"'Cinzel',Georgia,serif", fontSize:9, letterSpacing:".22em",
            color:char.stampColor, textTransform:"uppercase", marginBottom:10 }}>
            ♦ {char.title} ♦
          </div>
          <div style={{ width:180, height:.5, background:`linear-gradient(to right,transparent,${char.stampColor}60,transparent)`, margin:"0 auto 10px" }}/>
          <div style={{ fontFamily:"'EB Garamond',Georgia,serif", fontStyle:"italic", fontSize:13,
            color:"rgba(210,195,170,.7)", letterSpacing:".04em", marginBottom:6, maxWidth:280, padding:"0 16px" }}>
            {char.quote}
          </div>
          <div style={{ fontFamily:"'Cinzel',Georgia,serif", fontSize:8, letterSpacing:".15em",
            color:"rgba(180,160,130,.45)", textTransform:"uppercase", marginBottom:24 }}>
            {char.faction}
          </div>
          <button onClick={handleCollect}
            onMouseEnter={e=>{e.target.style.background="rgba(220,200,150,.1)";e.target.style.borderColor="rgba(220,200,150,.55)";}}
            onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.borderColor="rgba(220,200,150,.28)";}}
            style={{ background:"transparent", border:"1px solid rgba(220,200,150,.28)",
              color:"rgba(220,200,150,.8)", fontFamily:"'Cinzel',Georgia,serif",
              fontSize:9.5, letterSpacing:".25em", textTransform:"uppercase",
              padding:"10px 36px", cursor:"pointer", borderRadius:2, transition:"all .25s" }}>
            ♦ &nbsp; Collect &nbsp; ♦
          </button>
          <div style={{ marginTop:10, fontFamily:"'EB Garamond',Georgia,serif",
            fontStyle:"italic", fontSize:10, color:"rgba(160,145,120,.3)" }}>or click outside</div>
        </div>
      </div>
    );
  }

  /* ── MAIN APP ─────────────────────────────────────────────── */
  function MagicMaidensGallery() {
    const [activeSeries, setActiveSeries] = useState("genesis");
    const [cardVisible,  setCardVisible]  = useState(false);
    const [showIntro,    setShowIntro]    = useState(true);
    const [selectedChar, setSelectedChar] = useState(null);

    useEffect(() => {
      setCardVisible(false);
      const t = setTimeout(() => setCardVisible(true), 100);
      return () => clearTimeout(t);
    }, [activeSeries]);

    const filtered   = CHARACTERS.filter(c => c.series === activeSeries).sort((a,b) => parseInt(a.id) - parseInt(b.id));
    const seriesData = SERIES[activeSeries];

    return (
      <div style={{ minHeight:"100vh", position:"relative", fontFamily:"'Cinzel', Georgia, serif" }}>
        {showIntro && <IntroScreen onDone={() => setShowIntro(false)} />}
        {selectedChar && <CardRevealModal char={selectedChar} onClose={() => setSelectedChar(null)} />}
        <PaperBackground />

        <div style={{ position:"relative", zIndex:1, maxWidth:1040, margin:"0 auto", padding:"52px 28px 80px" }}>

          {/* MASTHEAD */}
          <div className="site-enter" style={{ textAlign:"center", marginBottom:48 }}>
            <div style={{ fontSize:9, letterSpacing:".45em", color:"#8A7050", marginBottom:14, textTransform:"uppercase" }}>
              ♦ &nbsp; Official Collection Archive &nbsp; ♦
            </div>
            <div style={{ display:"inline-block" }}>
              <h1 style={{
                fontFamily:"'Cinzel', Georgia, serif",
                fontSize:"clamp(38px, 7vw, 76px)", fontWeight:700,
                color:"#1E1608", letterSpacing:".06em", lineHeight:1, margin:0,
                textShadow:"2px 3px 0 rgba(180,155,100,.25), 1px 1px 0 rgba(255,255,255,.5)",
              }}>
                Magic Maidens
              </h1>
              <div style={{ height:2, background:"linear-gradient(to right, transparent, #3A2A0E55, transparent)", marginTop:6 }} />
            </div>
            <HeaderOrnament />
            <p style={{
              fontFamily:"'EB Garamond', Georgia, serif", fontStyle:"italic",
              fontSize:15, color:"#6B5030", marginTop:10, letterSpacing:".04em",
            }}>
              {seriesData.tagline}
            </p>
            <div style={{
              display:"inline-block", marginTop:16,
              border:"1px solid #3A2A0E28", padding:"4px 16px", borderRadius:1,
              fontFamily:"'Cinzel', Georgia, serif",
              fontSize:8, letterSpacing:".2em", color:"#8A7050", textTransform:"uppercase",
            }}>
              {filtered.length} of {seriesData.max || 100} — {seriesData.label}
            </div>
          </div>

          {/* SERIES TABS */}
          <div className="site-enter" style={{
            display:"flex", gap:10, justifyContent:"center", marginBottom:48,
            animationDelay:".1s", opacity:0, animationFillMode:"both",
          }}>
            {Object.entries(SERIES).map(([id, s]) => (
              <SeriesTab key={id} series={s} active={activeSeries === id}
                onClick={() => setActiveSeries(id)} />
            ))}
          </div>

          {/* SERIES BANNER */}
          <div key={activeSeries} className="ink-enter" style={{
            textAlign:"center", marginBottom:32,
            borderTop:".5px solid rgba(58,42,14,.15)",
            borderBottom:".5px solid rgba(58,42,14,.15)",
            padding:"10px 0",
          }}>
            <div style={{
              fontFamily:"'Cinzel', Georgia, serif",
              fontSize:10, letterSpacing:".3em",
              color:"#3A2A0E70", textTransform:"uppercase",
            }}>
              ♦ &nbsp; {seriesData.label} &nbsp; · &nbsp; Series {seriesData.roman} &nbsp; ♦
            </div>
          </div>

          {/* CARD GRID */}
          <div style={{
            display:"grid",
            gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))",
            gap:28,
          }}>
            {filtered.map((char) => (
              <CharacterCard key={char.id} char={char} visible={cardVisible} onSelect={() => setSelectedChar(char)} />
            ))}
          </div>

          {/* FOOTER */}
          <div style={{
            marginTop:72, textAlign:"center",
            borderTop:".5px solid rgba(58,42,14,.12)", paddingTop:28,
          }}>
            <CompassRose size={30} color="#6B5030" opacity={.22} />
            <div style={{ marginTop:10, fontSize:8, letterSpacing:".3em", color:"#A08A60", textTransform:"uppercase" }}>
              ♦ &nbsp; Magic Maidens &nbsp; · &nbsp; All Rights Reserved &nbsp; ♦
            </div>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<MagicMaidensGallery />);
</script>
</body>
</html>
