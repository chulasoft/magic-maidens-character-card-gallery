<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Maidens — Archive</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { min-height: 100vh; }
    body { background: #E8DFD0; }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px) }
      to   { opacity:1; transform:translateY(0) }
    }
    @keyframes inkDrop {
      from { opacity:0; transform:scaleX(0) }
      to   { opacity:1; transform:scaleX(1) }
    }
    .site-enter { animation: fadeIn .8s cubic-bezier(.16,1,.3,1) both; }
    .ink-enter  { animation: inkDrop .5s cubic-bezier(.16,1,.3,1) both; }

    .mm-card { position:relative; overflow:hidden; border-radius:1px; cursor:default; }
    .mm-panel {
      position:absolute; bottom:0; left:0; right:0;
      transition: opacity .5s ease, transform .5s cubic-bezier(.16,1,.3,1);
    }
    .mm-card:hover .mm-panel { opacity:0; transform:translateY(10px); pointer-events:none; }
    .mm-card:hover { box-shadow: 0 22px 64px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.14) !important; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect } = React;

  /* ── DATA ────────────────────────────────────────────────── */
  const SERIES = {
    genesis: { label:"Arcane Genesis", roman:"I",  tagline:"The First Age of Awakening" },
    phantom: { label:"Arcane Phantom", roman:"II", tagline:"Echoes Beyond the Veil", max:130 },
  };

  const CHARACTERS = [
    {
      id:"026", series:"genesis", imgKey:"G026",
      name:["Cyrina","Elarion"], title:"Frostfang Warden",
      quote:"She carries the last blood of the old beasts.",
      faction:"Moonveil Covenant", element:"frost",
      inkColor:"#1A3A5C", stampColor:"#4A8AAA",
      gradTop:"#9CC5D8", gradMid:"#5A9AB8", gradBot:"#1E4A68", rune:"❄",
    },
    {
      id:"096", series:"genesis", imgKey:"G096",
      name:["Luneth","Aetheris"], title:"Chrono Sovereign",
      quote:"She exists between the final seconds.",
      faction:"Aetheris Chronicle Order", element:"chrono",
      inkColor:"#3A2A0E", stampColor:"#AA8830",
      gradTop:"#D4B870", gradMid:"#A88830", gradBot:"#3A2010", rune:"◈",
    },
    {
      id:"098", series:"genesis", imgKey:"G098",
      name:["Eirlys","Vantora"], title:"Tempest Knight",
      quote:"She speaks, and the heavens answer.",
      faction:"Aetheris Skyward Order", element:"storm",
      inkColor:"#1A2A3A", stampColor:"#708898",
      gradTop:"#B8CCE0", gradMid:"#7090B0", gradBot:"#1A3050", rune:"⚡",
    },
    {
      id:"096a", series:"phantom", imgKey:"P096",
      name:["Aurelia","Vermillion"], title:"Crimson Duchess",
      quote:"The throne bows before her smile.",
      faction:"House Vermillion", element:"blood",
      inkColor:"#3A0808", stampColor:"#AA1515",
      gradTop:"#C03030", gradMid:"#801010", gradBot:"#1A0000", rune:"♦",
    },
    {
      id:"029", series:"phantom", imgKey:"P029",
      name:["Velka","Noctyr"], title:"Fang Seer",
      quote:"She walks where the wild gods sleep.",
      faction:"Black Moon Communion", element:"beast",
      inkColor:"#1A0808", stampColor:"#8B1515",
      gradTop:"#A02020", gradMid:"#600808", gradBot:"#0A0000", rune:"🐺",
    },
    {
      id:"039", series:"phantom", imgKey:"P039",
      name:["Morvayne","Vespera"], title:"Wolfthrone Hexer",
      quote:"The wild obeys only one voice.",
      faction:"Bloodfang Dominion", element:"hex",
      inkColor:"#1A0808", stampColor:"#8B1010",
      gradTop:"#A01515", gradMid:"#580808", gradBot:"#0A0000", rune:"⚔",
    },
    {
      id:"059", series:"phantom", imgKey:"P059",
      name:["Ravessia","Vale"], title:"Scarlet Vesper",
      quote:"By the time you see the beautiful red, it is already over.",
      faction:"Ashen Veil Fixers", element:"scarlet",
      inkColor:"#2A0808", stampColor:"#A01818",
      gradTop:"#B02020", gradMid:"#700808", gradBot:"#150000", rune:"🌹",
    },
    {
      id:"070", series:"phantom", imgKey:"P070",
      name:["Vaelith","Nocturne"], title:"Ember Revenant",
      quote:"Only the dead ever learn her name.",
      faction:"Nightveil Fixers", element:"ember",
      inkColor:"#2A0808", stampColor:"#B83020",
      gradTop:"#C05030", gradMid:"#882010", gradBot:"#1A0808", rune:"🔥",
    },
    {
      id:"090", series:"phantom", imgKey:"P090",
      name:["Seraphine","Noctis"], title:"Second Eclipse",
      quote:"No prayer survives the crimson night.",
      faction:"Crimson Fixers", element:"eclipse",
      inkColor:"#3A0A0E", stampColor:"#8B1A1A",
      gradTop:"#C04040", gradMid:"#801010", gradBot:"#200008", rune:"🌑",
    },
  ];

  const SYMBOL = { frost:"❄", chrono:"◈", storm:"⚡", void:"✦", ember:"🔥", shadow:"◑", eclipse:"🌑", blood:"♦", beast:"🐺", hex:"⚔", scarlet:"🌹" };

  /* ── ORNAMENT DIVIDER ────────────────────────────────────── */
  // circle at cx=16 = exact center of viewBox 0-32
  // diamonds symmetric: left at x=10, right at x=22 → midpoint = 16 ✓
  function OrnamentDivider({ inkColor }) {
    return (
      <div style={{ display:"flex", alignItems:"center", margin:"8px 0" }}>
        <div style={{ flex:1, height:".5px", background:`linear-gradient(to right, transparent, ${inkColor}40)` }} />
        <svg width="32" height="10" viewBox="0 0 32 10" style={{ flexShrink:0 }}>
          <line x1="0" y1="5" x2="5"  y2="5" stroke={inkColor} strokeWidth=".6" opacity=".35"/>
          <polygon points="7,5 10,2.5 13,5 10,7.5" fill="none" stroke={inkColor} strokeWidth=".8" opacity=".5"/>
          <circle cx="16" cy="5" r="1.3" fill={inkColor} opacity=".55"/>
          <polygon points="19,5 22,2.5 25,5 22,7.5" fill="none" stroke={inkColor} strokeWidth=".8" opacity=".5"/>
          <line x1="27" y1="5" x2="32" y2="5" stroke={inkColor} strokeWidth=".6" opacity=".35"/>
        </svg>
        <div style={{ flex:1, height:".5px", background:`linear-gradient(to left, transparent, ${inkColor}40)` }} />
      </div>
    );
  }

  /* ── HEADER ORNAMENT ─────────────────────────────────────── */
  // center diamond at x=140 = exact half of viewBox 0-280 ✓
  function HeaderOrnament() {
    return (
      <svg width="280" height="20" viewBox="0 0 280 20"
        style={{ opacity:.3, display:"block", margin:"4px auto 0" }}>
        <line x1="0"   y1="10" x2="118" y2="10" stroke="#3A2A0E" strokeWidth=".6"/>
        <polygon points="120,10 126,6.5 130,10 126,13.5" fill="none" stroke="#3A2A0E" strokeWidth=".8"/>
        <polygon points="140,3 144,10 140,17 136,10"     fill="#3A2A0E" opacity=".65"/>
        <polygon points="150,10 154,6.5 158,10 154,13.5" fill="none" stroke="#3A2A0E" strokeWidth=".8"/>
        <line x1="160" y1="10" x2="280" y2="10" stroke="#3A2A0E" strokeWidth=".6"/>
      </svg>
    );
  }

  /* ── COMPASS ROSE ────────────────────────────────────────── */
  function CompassRose({ size=28, color="#6B5030", opacity=0.7 }) {
    return (
      <svg width={size} height={size} viewBox="0 0 40 40" style={{ opacity }}>
        {[0,45,90,135].map(r => (
          <g key={r} transform={`rotate(${r} 20 20)`}>
            <polygon points="20,3 22,18 20,17 18,18" fill={color} />
            <polygon points="20,37 22,22 20,23 18,22" fill={color} opacity={.5} />
          </g>
        ))}
        <circle cx="20" cy="20" r="3"  fill={color} />
        <circle cx="20" cy="20" r="6"  fill="none" stroke={color} strokeWidth=".5" />
        <circle cx="20" cy="20" r="10" fill="none" stroke={color} strokeWidth=".3" />
      </svg>
    );
  }

  /* ── CHARACTER CARD ──────────────────────────────────────── */
  function CharacterCard({ char, visible }) {
    const [entered,   setEntered]   = useState(false);
    const [imgLoaded, setImgLoaded] = useState(false);
    const [imgError,  setImgError]  = useState(false);

    useEffect(() => {
      if (!visible) { setEntered(false); return; }
      const t = setTimeout(() => setEntered(true), 60);
      return () => clearTimeout(t);
    }, [visible]);

    return (
      <div
        className="mm-card"
        style={{
          aspectRatio:"9/16",
          background:"#C8BCAA",
          border:`1px solid ${char.inkColor}18`,
          boxShadow:"0 4px 20px rgba(0,0,0,.12), 0 1px 4px rgba(0,0,0,.08)",
          transform: entered ? "translateY(0) scale(1)" : "translateY(18px)",
          opacity: entered ? 1 : 0,
          transition:"transform .5s cubic-bezier(.16,1,.3,1), opacity .5s, box-shadow .4s",
        }}
      >
        {/* Image — fills entire card */}
        <div style={{ position:"absolute", inset:0 }}>
          {!imgError && (
            <img
              src={`characters/${char.imgKey}.png`}
              alt={char.name.join(" ")}
              onLoad={() => setImgLoaded(true)}
              onError={() => setImgError(true)}
              style={{
                width:"100%", height:"100%",
                objectFit:"cover", objectPosition:"center top",
                display:"block",
                opacity: imgLoaded ? 1 : 0,
                transition:"opacity .4s",
              }}
            />
          )}
          {/* Fallback */}
          {(!imgLoaded || imgError) && (
            <div style={{
              position:"absolute", inset:0,
              background:`linear-gradient(170deg, ${char.gradTop}70 0%, ${char.gradMid}55 45%, ${char.gradBot}90 100%)`,
            }}>
              <div style={{
                position:"absolute", right:10, top:"18%",
                fontSize:110, lineHeight:1, color:char.stampColor,
                opacity:.07, userSelect:"none", fontFamily:"serif", filter:"blur(2px)",
              }}>
                {char.rune}
              </div>
            </div>
          )}
        </div>

        {/* Info panel — overlays bottom, fades on hover */}
        <div className="mm-panel" style={{
          background:`linear-gradient(to top, #D4C8B2FF 0%, #D4C8B2FF 80%, #D4C8B200 100%)`,
          padding:"32px 16px 16px",
        }}>
          {/* Series + number row */}
          <div style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:7, letterSpacing:".22em",
            color:`${char.inkColor}70`, textTransform:"uppercase", marginBottom:4,
          }}>
            {SERIES[char.series].label} &nbsp;·&nbsp; {char.id}
          </div>

          <OrnamentDivider inkColor={char.inkColor} />

          {/* Name */}
          <div style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:22, fontWeight:700, lineHeight:1.05,
            color:char.inkColor, letterSpacing:".02em",
            textShadow:"1px 1px 0 rgba(255,255,255,.3)",
            marginBottom:4,
          }}>
            {char.name[0]}<br/>{char.name[1]}
          </div>

          {/* Title */}
          <div style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:8, letterSpacing:".18em",
            color:char.stampColor, textTransform:"uppercase",
          }}>
            ♦ {char.title} ♦
          </div>

          <OrnamentDivider inkColor={char.inkColor} />

          {/* Quote */}
          <div style={{
            fontFamily:"'EB Garamond', Georgia, serif",
            fontStyle:"italic", fontSize:11.5,
            color:`${char.inkColor}B0`, lineHeight:1.55, marginBottom:10,
          }}>
            {char.quote}
          </div>

          {/* Faction */}
          <div style={{
            borderTop:`.5px solid ${char.inkColor}18`, paddingTop:8,
            display:"flex", alignItems:"center", gap:7,
          }}>
            <div style={{
              width:18, height:18, border:`1px solid ${char.inkColor}45`,
              borderRadius:2, display:"flex", alignItems:"center",
              justifyContent:"center", fontSize:9, color:char.inkColor, flexShrink:0,
            }}>
              {SYMBOL[char.element]}
            </div>
            <span style={{
              fontFamily:"'Cinzel', Georgia, serif",
              fontSize:8, letterSpacing:".12em",
              color:`${char.inkColor}A0`, textTransform:"uppercase", lineHeight:1.3,
            }}>
              {char.faction}
            </span>
          </div>
        </div>
      </div>
    );
  }

  /* ── SERIES TAB ───────────────────────────────────────────── */
  function SeriesTab({ series, active, onClick }) {
    return (
      <button onClick={onClick} style={{
        background: active ? "rgba(30,43,74,.08)" : "transparent",
        border: active ? "1px solid rgba(30,43,74,.35)" : "1px solid rgba(30,43,74,.12)",
        color: active ? "#1E2B4A" : "#8A7A60",
        fontFamily:"'Cinzel', Georgia, serif",
        fontSize:10, letterSpacing:".2em", textTransform:"uppercase",
        padding:"8px 24px", cursor:"pointer", borderRadius:1, transition:"all .25s",
        display:"flex", flexDirection:"column", alignItems:"center", gap:2,
      }}>
        <span style={{ fontSize:8, opacity:.6, letterSpacing:".3em" }}>Series {series.roman}</span>
        <span>{series.label}</span>
      </button>
    );
  }

  /* ── PAPER BG ─────────────────────────────────────────────── */
  function PaperBackground() {
    return (
      <div style={{
        position:"fixed", inset:0, zIndex:0, background:"#E8DFD0",
        backgroundImage:`
          radial-gradient(ellipse at 20% 15%, rgba(200,185,155,.6) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(185,170,140,.5) 0%, transparent 45%)
        `,
      }}>
        <div style={{
          position:"absolute", inset:0,
          backgroundImage:`repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(160,140,100,.018) 4px,rgba(160,140,100,.018) 5px)`,
        }}/>
        <div style={{
          position:"absolute", inset:0,
          background:"radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(130,110,80,.18) 100%)",
        }}/>
      </div>
    );
  }

  /* ── INTRO SCREEN ─────────────────────────────────────────── */
  function IntroScreen({ onDone }) {
    const [phase, setPhase] = useState("in");

    useEffect(() => {
      const t1 = setTimeout(() => setPhase("hold"), 700);
      const t2 = setTimeout(() => setPhase("out"),  2100);
      const t3 = setTimeout(() => onDone(),          2900);
      return () => [t1,t2,t3].forEach(clearTimeout);
    }, []);

    const shown = phase !== "in";
    return (
      <div style={{
        position:"fixed", inset:0, zIndex:100,
        background:"#E2D6C0",
        display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", gap:18,
        opacity: phase === "out" ? 0 : 1,
        transition: phase === "out" ? "opacity .8s ease-in" : "opacity .5s ease-out",
        pointerEvents: phase === "out" ? "none" : "all",
      }}>
        <div style={{
          position:"absolute", inset:0,
          background:"radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(120,100,70,.2) 100%)",
        }}/>
        <div style={{
          opacity: shown ? 1 : 0, transformOrigin:"center",
          transform: shown ? "scaleX(1)" : "scaleX(0)",
          transition:"all .7s cubic-bezier(.16,1,.3,1) .25s",
        }}>
          <HeaderOrnament />
        </div>
        <div style={{
          textAlign:"center",
          opacity: shown ? 1 : 0,
          transform: shown ? "translateY(0)" : "translateY(14px)",
          transition:"all .75s cubic-bezier(.16,1,.3,1) .1s",
        }}>
          <div style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:8, letterSpacing:".5em", color:"#8A7050",
            marginBottom:14, textTransform:"uppercase",
          }}>
            ♦ &nbsp; Official Collection Archive &nbsp; ♦
          </div>
          <h1 style={{
            fontFamily:"'Cinzel', Georgia, serif",
            fontSize:"clamp(42px, 8vw, 86px)", fontWeight:700,
            lineHeight:1, color:"#1E1608", margin:0, letterSpacing:".06em",
            textShadow:"2px 3px 0 rgba(180,155,100,.2), 1px 1px 0 rgba(255,255,255,.5)",
          }}>
            Magic Maidens
          </h1>
          <div style={{
            fontFamily:"'EB Garamond', Georgia, serif",
            fontStyle:"italic", fontSize:14, color:"#6B5030",
            marginTop:10, letterSpacing:".06em",
          }}>
            Arcane Genesis &nbsp;·&nbsp; Arcane Phantom
          </div>
        </div>
        <div style={{
          opacity: shown ? 1 : 0, transformOrigin:"center",
          transform: shown ? "scaleX(1)" : "scaleX(0)",
          transition:"all .7s cubic-bezier(.16,1,.3,1) .4s",
        }}>
          <HeaderOrnament />
        </div>
        <div style={{
          position:"absolute", bottom:36,
          fontFamily:"'Cinzel', Georgia, serif",
          fontSize:8, letterSpacing:".3em", color:"#8A7050", textTransform:"uppercase",
          opacity: phase === "hold" ? 1 : 0, transition:"opacity .5s .15s",
        }}>
          Entering the Archive…
        </div>
      </div>
    );
  }

  /* ── MAIN APP ─────────────────────────────────────────────── */
  function MagicMaidensGallery() {
    const [activeSeries, setActiveSeries] = useState("genesis");
    const [cardVisible,  setCardVisible]  = useState(false);
    const [showIntro,    setShowIntro]    = useState(true);

    useEffect(() => {
      setCardVisible(false);
      const t = setTimeout(() => setCardVisible(true), 100);
      return () => clearTimeout(t);
    }, [activeSeries]);

    const filtered   = CHARACTERS.filter(c => c.series === activeSeries);
    const seriesData = SERIES[activeSeries];

    return (
      <div style={{ minHeight:"100vh", position:"relative", fontFamily:"'Cinzel', Georgia, serif" }}>
        {showIntro && <IntroScreen onDone={() => setShowIntro(false)} />}
        <PaperBackground />

        <div style={{ position:"relative", zIndex:1, maxWidth:1040, margin:"0 auto", padding:"52px 28px 80px" }}>

          {/* MASTHEAD */}
          <div className="site-enter" style={{ textAlign:"center", marginBottom:48 }}>
            <div style={{ fontSize:9, letterSpacing:".45em", color:"#8A7050", marginBottom:14, textTransform:"uppercase" }}>
              ♦ &nbsp; Official Collection Archive &nbsp; ♦
            </div>
            <div style={{ display:"inline-block" }}>
              <h1 style={{
                fontFamily:"'Cinzel', Georgia, serif",
                fontSize:"clamp(38px, 7vw, 76px)", fontWeight:700,
                color:"#1E1608", letterSpacing:".06em", lineHeight:1, margin:0,
                textShadow:"2px 3px 0 rgba(180,155,100,.25), 1px 1px 0 rgba(255,255,255,.5)",
              }}>
                Magic Maidens
              </h1>
              <div style={{ height:2, background:"linear-gradient(to right, transparent, #3A2A0E55, transparent)", marginTop:6 }} />
            </div>
            <HeaderOrnament />
            <p style={{
              fontFamily:"'EB Garamond', Georgia, serif", fontStyle:"italic",
              fontSize:15, color:"#6B5030", marginTop:10, letterSpacing:".04em",
            }}>
              {seriesData.tagline}
            </p>
            <div style={{
              display:"inline-block", marginTop:16,
              border:"1px solid #3A2A0E28", padding:"4px 16px", borderRadius:1,
              fontFamily:"'Cinzel', Georgia, serif",
              fontSize:8, letterSpacing:".2em", color:"#8A7050", textTransform:"uppercase",
            }}>
              {filtered.length} of {seriesData.max || 100} — {seriesData.label}
            </div>
          </div>

          {/* SERIES TABS */}
          <div className="site-enter" style={{
            display:"flex", gap:10, justifyContent:"center", marginBottom:48,
            animationDelay:".1s", opacity:0, animationFillMode:"both",
          }}>
            {Object.entries(SERIES).map(([id, s]) => (
              <SeriesTab key={id} series={s} active={activeSeries === id}
                onClick={() => setActiveSeries(id)} />
            ))}
          </div>

          {/* SERIES BANNER */}
          <div key={activeSeries} className="ink-enter" style={{
            textAlign:"center", marginBottom:32,
            borderTop:".5px solid rgba(58,42,14,.15)",
            borderBottom:".5px solid rgba(58,42,14,.15)",
            padding:"10px 0",
          }}>
            <div style={{
              fontFamily:"'Cinzel', Georgia, serif",
              fontSize:10, letterSpacing:".3em",
              color:"#3A2A0E70", textTransform:"uppercase",
            }}>
              ♦ &nbsp; {seriesData.label} &nbsp; · &nbsp; Series {seriesData.roman} &nbsp; ♦
            </div>
          </div>

          {/* CARD GRID */}
          <div style={{
            display:"grid",
            gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))",
            gap:28,
          }}>
            {filtered.map((char) => (
              <CharacterCard key={char.id} char={char} visible={cardVisible} />
            ))}
          </div>

          {/* FOOTER */}
          <div style={{
            marginTop:72, textAlign:"center",
            borderTop:".5px solid rgba(58,42,14,.12)", paddingTop:28,
          }}>
            <CompassRose size={30} color="#6B5030" opacity={.22} />
            <div style={{ marginTop:10, fontSize:8, letterSpacing:".3em", color:"#A08A60", textTransform:"uppercase" }}>
              ♦ &nbsp; Magic Maidens &nbsp; · &nbsp; All Rights Reserved &nbsp; ♦
            </div>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<MagicMaidensGallery />);
</script>
</body>
</html>
